  <line x1="15.75" y1="9"   x2="15.75" y2="27"  stroke="#1B4332" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="23.75" y1="3.5" x2="23.75" y2="27"  stroke="#1B4332" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Bodies -->
  <rect x="6"  y="19"  width="3.5" height="7"  rx="0.6" fill="#1B4332"/>
  <rect x="14" y="12"  width="3.5" height="13" rx="0.6" fill="#1B4332"/>
  <rect x="22" y="6"   width="3.5" height="19" rx="0.6" fill="#1B4332"/>
