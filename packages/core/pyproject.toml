[project]
name = "ky-core"
version = "0.0.2"
description = "ky-platform data core (SQLite storage + factor library + universe utilities)"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["ky_core*"]
