# Series ID normalization for legacy macro bulk imports.
#
# The imports pull from three archive shapes:
#   1. QuantPlatform macro CSVs (columns include `indicator` + `source`,
#      often Korean strings like "기준금리").
#   2. QuantDB `quant_platform_history.db` macro_series rows (already carry
#      a native `series_id` and `source`, e.g. `722Y001:0101000` / ECOS or
#      `CPIAUCSL` / FRED).
#   3. Commodity CSVs (just `date,value` — series id lives in the filename).
#
# The importer applies these rules in order:
#   a. If `(source, indicator)` matches an alias entry here, use the mapped
#      canonical id.
#   b. Otherwise keep the native id (for DB rows) or prefix the raw indicator
#      with `legacy:` (for CSV rows that have no canonical code).
#
# Canonical codes follow the same `stat_code/item_code` style the live ECOS
# adapter already persists so Macro Compass queries can join across fresh +
# legacy rows.

ecos:
  "기준금리": "722Y001/0101000"
  "원달러환율": "731Y001/0000001"
  "USD_KRW": "731Y001/0000001"
  "소비자물가지수": "901Y009/0"
