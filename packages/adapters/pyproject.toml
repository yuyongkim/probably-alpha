[project]
name = "ky-adapters"
version = "0.0.1"
description = "ky-platform external data source adapters (KIS / Kiwoom / DART / FRED / ECOS / ...)"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.6",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["ky_adapters*"]
