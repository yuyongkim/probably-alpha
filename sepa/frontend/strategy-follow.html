<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#060e18" />
  <meta name="color-scheme" content="dark" />
  <title>전략 따라하기 — SEPA</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .strategy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-top: 16px; }
    .strategy-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; cursor: pointer; transition: border-color .2s, transform .1s; }
    .strategy-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .strategy-card__head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .strategy-card__name { font-size: 18px; font-weight: 700; margin: 0; }
    .strategy-card__family { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .strategy-card__return { font-size: 24px; font-weight: 800; }
    .strategy-card__return.pos { color: var(--good); }
    .strategy-card__return.neg { color: var(--bad); }
    .strategy-card__metrics { display: flex; gap: 16px; margin: 12px 0; font-size: 13px; }
    .strategy-card__metrics dt { color: var(--muted); font-size: 11px; }
    .strategy-card__metrics dd { font-weight: 600; margin: 0; }
    .strategy-card__tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .strategy-card__tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: rgba(255,255,255,.06); color: var(--muted); }
    .risk-low { border-color: rgba(34,197,94,.28); }
    .risk-medium { border-color: rgba(245,158,11,.28); }
    .risk-high { border-color: rgba(239,68,68,.28); }

    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0; }
    .filter-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-size: 13px; }
    .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .detail-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.7); overflow-y: auto; }
    .detail-modal.open { display: flex; justify-content: center; padding: 40px 20px; }
    .detail-content { background: var(--bg); border-radius: 12px; max-width: 900px; width: 100%; padding: 32px; position: relative; }
    .detail-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; }

    .picks-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .picks-table th { text-align: left; font-size: 12px; color: var(--muted); padding: 8px 6px; border-bottom: 1px solid var(--border); }
    .picks-table td { padding: 10px 6px; border-bottom: 1px solid rgba(255,255,255,.04); font-size: 14px; }
    .picks-table tr:hover { background: rgba(255,255,255,.03); }

    .exec-card { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin: 8px 0; }
    .exec-row { display: flex; justify-content: space-between; padding: 4px 0; }
    .exec-label { color: var(--muted); font-size: 13px; }
    .exec-value { font-weight: 600; font-size: 14px; }
    .exec-stop { color: var(--bad); }
    .exec-target { color: var(--good); }

    .tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
    .tab-btn { padding: 10px 20px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>
  <section class="control-band">
    <header class="page-header">
      <div class="hero-copy">
        <p class="eyebrow">SEPA / 전략 따라하기</p>
        <h1>Market Wizards 전략을 그대로 따라하세요</h1>
        <p class="lead">12가지 검증된 트레이더 전략 중 나에게 맞는 전략을 선택하고, 오늘의 매수 후보를 확인하세요.</p>
      </div>
      <div class="toolbar">
        <div class="lang-switch" aria-label="Language switch">
          <button type="button" class="lang-chip" data-lang="ko">KO</button>
          <button type="button" class="lang-chip" data-lang="en">EN</button>
        </div>
        <input id="apiBase" value="" aria-label="API Base" />
        <label style="color:var(--muted);font-size:12px">투자금
          <input id="userCapital" type="text" value="100000000" style="width:100px;padding:4px 8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text)" />
        </label>
      </div>
    </header>
    <nav class="page-nav">
      <a class="nav-link" href="./index.html">커맨드 센터</a>
      <a class="nav-link" href="./glossary.html">플레이북 용어</a>
      <a class="nav-link" href="./market-wizards-people.html">위저드 인덱스</a>
      <a class="nav-link" href="./market-wizards.html">전략 프레임</a>
      <a class="nav-link" href="./market-wizards-korea.html">코리아 프리셋</a>
      <a class="nav-link" href="./wizard-screener.html">전략 스크리너</a>
      <a class="nav-link" href="./trader-debate.html">트레이더 토론</a>
      <a class="nav-link" href="./backtest.html">백테스트</a>
      <a class="nav-link is-active" href="./strategy-follow.html">전략 따라하기</a>
    </nav>
  </section>

  <!-- Filter -->
  <section class="section-shell">
    <div id="filterBar" class="filter-bar">
      <button class="filter-chip active" data-family="all">전체</button>
      <button class="filter-chip" data-family="growth_momentum">성장 모멘텀</button>
      <button class="filter-chip" data-family="trend_following">추세추종</button>
      <button class="filter-chip" data-family="swing">단기 스윙</button>
      <button class="filter-chip" data-family="macro">매크로 방어</button>
      <button class="filter-chip" data-family="value">가치투자</button>
    </div>
    <div id="strategyGrid" class="strategy-grid">
      <p style="color:var(--muted)">로딩 중...</p>
    </div>
  </section>

  <!-- Detail Modal -->
  <div id="detailModal" class="detail-modal">
    <div class="detail-content">
      <button class="detail-close" id="detailClose">&times;</button>
      <div id="detailBody"></div>
    </div>
  </div>

  <!-- Stock Profile Dialog (reused) -->
  <dialog id="companyProfileDialog" class="profile-dialog">
    <div class="profile-dialog__inner">
      <div class="profile-dialog__header">
        <h3 id="profileName"></h3>
        <button id="profileClose" class="profile-dialog__close">&times;</button>
      </div>
      <div id="profileContent" class="profile-dialog__body"></div>
    </div>
  </dialog>

  <script type="module" src="./js/strategy-follow-page.js?v=1775488167"></script>
</body>
</html>
