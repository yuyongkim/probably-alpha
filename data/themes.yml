# ky-platform · 20 Korean market themes
#
# Curated static theme → symbol map used by
# ``packages/core/ky_core/scanning/themes.py``.  Themes are *orthogonal* to the
# KRX sector taxonomy: AI-semiconductor stocks sit across semis, equipment and
# IT services, etc.
#
# Sources (best-effort, no external call required at runtime):
#   - KIS  stocks_info/theme_code.py (master file on new.real.download.dws.co.kr)
#   - FnGuide / 네이버증권 테마페이지 (대표 편입 종목)
#   - 각 종목의 사업보고서
#
# Format:
#   code    : short stable id (3–5 letters, A-Z)
#   name    : 한글 표시명
#   bucket  : logical grouping (tech | energy | mobility | bio | defense | finance | consumer)
#   symbols : ticker codes present in the ky.db universe table
#
# Additions/edits here are picked up automatically on API restart (no code change).

